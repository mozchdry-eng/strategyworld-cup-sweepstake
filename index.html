      { name: "Jordan",         flag: "🇯🇴", fifaRank: 64, tier: 7 },
      { name: "South Africa",   flag: "🇿🇦", fifaRank: 67, tier: 7 },
      { name: "Cabo Verde",     flag: "🇨🇻", fifaRank: 70, tier: 7 },
      { name: "Panama",         flag: "🇵🇦", fifaRank: 72, tier: 8 },
      { name: "Haiti",          flag: "🇭🇹", fifaRank: 76, tier: 8 },
      { name: "Curaçao",        flag: "🇨🇼", fifaRank: 82, tier: 8 },
      { name: "DR Congo",       flag: "🇨🇩", fifaRank: 84, tier: 8 },
      { name: "Martinique",     flag: "🇲🇶", fifaRank: 86, tier: 8 },
      { name: "New Zealand",    flag: "🇳🇿", fifaRank: 88, tier: 8 },
    ];

    const ROUND_POINTS = {
      "Group Stage":   0,
      "Round of 32":   3,
      "Round of 16":   6,
      "Quarter-final": 10,
      "Semi-final":    15,
      "Runner-up":     20,
      "Winner":        30,
    };

    const ROUND_ORDER = Object.keys(ROUND_POINTS);

    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function encodeDrawToHash(participants, assignments) {
      try {
        return btoa(encodeURIComponent(JSON.stringify({ participants, assignments })));
      } catch { return ""; }
    }

    function decodeDrawFromHash(hash) {
      try {
        const { participants, assignments } = JSON.parse(decodeURIComponent(atob(hash.replace(/^#/, ""))));
        return { participants, assignments };
      } catch { return null; }
    }

    function App() {
      const [view, setView] = useState("setup");
      const [participants, setParticipants] = useState(["", "", "", "", "", ""]);
      const [assignments, setAssignments] = useState(null);
      const [teamStatus, setTeamStatus] = useState({});
      const [groupWins, setGroupWins] = useState({});
      const [lastUpdated, setLastUpdated] = useState(null);
      const [loading, setLoading] = useState(false);
      const [scoreError, setScoreError] = useState(null);
      const [revealedTiers, setRevealedTiers] = useState([]);
      const [copied, setCopied] = useState(false);
      const [siteUnlocked, setSiteUnlocked] = useState(false);
      const [isAdmin, setIsAdmin] = useState(false);
      const [passwordInput, setPasswordInput] = useState("");
      const [passwordError, setPasswordError] = useState(false);
      const [resetLocked, setResetLocked] = useState(true);
      const [resetPwInput, setResetPwInput] = useState("");
      const [resetPwError, setResetPwError] = useState(false);
      const [showResetPrompt, setShowResetPrompt] = useState(false);

      const PASSWORD = "TrumpCup";

      function trySiteUnlock() {
        if (passwordInput === PASSWORD) {
          setSiteUnlocked(true);
          setIsAdmin(true);
          setPasswordError(false);
          setPasswordInput("");
        } else {
          setPasswordError(true);
          setPasswordInput("");
        }
      }

      function tryResetUnlock() {
        if (resetPwInput === PASSWORD) {
          setResetLocked(false);
          setShowResetPrompt(false);
          setResetPwInput("");
          setResetPwError(false);
        } else {
          setResetPwError(true);
          setResetPwInput("");
        }
      }

      useEffect(() => {
        const hash = window.location.hash.slice(1);
        if (hash) {
          const decoded = decodeDrawFromHash(hash);
          if (decoded) {
            setParticipants(decoded.participants);
            setAssignments(decoded.assignments);
            setRevealedTiers([1,2,3,4,5,6,7,8]);
            setView("leaderboard");
          }
        }
      }, []);

      const fetchScores = useCallback(async () => {
        setLoading(true);
        setScoreError(null);
        try {
          const res = await fetch("./scores.json?t=" + Date.now());
          if (!res.ok) throw new Error(`Could not load scores (${res.status})`);
          const data = await res.json();
          setTeamStatus(data.teamStatus || {});
          setGroupWins(data.groupWins || {});
          setLastUpdated(data.lastUpdated || null);
        } catch (e) {
          setScoreError(e.message);
        } finally {
          setLoading(false);
        }
      }, []);

      useEffect(() => { fetchScores(); }, [assignments]);

      function runDraw() {
        const names = participants.filter(p => p.trim());
        if (names.length !== 6) return;
        const result = {};
        names.forEach(n => result[n] = []);
        for (let tier = 1; tier <= 8; tier++) {
          const tierTeams = shuffle(TEAMS_RAW.filter(t => t.tier === tier));
          names.forEach((name, i) => result[name].push(tierTeams[i]));
        }
        setAssignments(result);
        setRevealedTiers([]);
        setView("draw");
        for (let t = 1; t <= 8; t++) {
          setTimeout(() => setRevealedTiers(prev => [...prev, t]), t * 600);
        }
        window.history.replaceState(null, "", "#" + encodeDrawToHash(names, result));
      }

      function resetDraw() {
        if (!confirm("Reset everything and run a new draw?")) return;
        setAssignments(null);
        setTeamStatus({});
        setLastUpdated(null);
        setView("setup");
        window.history.replaceState(null, "", window.location.pathname);
      }

      function copyLink() {
        navigator.clipboard.writeText(window.location.href).then(() => {
          setCopied(true);
          setTimeout(() => setCopied(false), 2000);
        });
      }

      function getTeamPoints(team) {
        const round = teamStatus[team.name];
        const roundPts = round ? (ROUND_POINTS[round] || 0) : 0;
        const winPts   = groupWins[team.name] || 0;
        return roundPts + winPts;
      }

      function getTeamPointsBreakdown(team) {
        const round    = teamStatus[team.name];
        const roundPts = round ? (ROUND_POINTS[round] || 0) : 0;
        const wins     = groupWins[team.name] || 0;
        return { round, roundPts, wins };
      }

      function getParticipantScore(name) {
        if (!assignments?.[name]) return 0;
        return assignments[name].reduce((sum, t) => sum + getTeamPoints(t), 0);
      }

      function getSortedLeaderboard() {
        if (!assignments) return [];
        return Object.keys(assignments)
          .map(name => ({ name, score: getParticipantScore(name) }))
          .sort((a, b) => b.score - a.score);
      }

      const allFilled = participants.every(p => p.trim().length > 0);
      const tierNames = {1:"Elite",2:"Contenders",3:"Dark Horses",4:"Hopefuls",5:"Outsiders",6:"Underdogs",7:"Long Shots",8:"Wildcards"};

      return (
        <>
          <style>{`
            @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap');
            *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
            :root {
              --bg:    #d6348a;
              --chalk: #ffffff;
              --muted: rgba(255,255,255,0.6);
              --line:  rgba(255,255,255,0.18);
              --ink:   #2a0018;
              --radius: 12px;
            }
            body { background: var(--bg); font-family: 'Montserrat', sans-serif; color: var(--chalk); min-height: 100vh; }
            .app  { max-width: 900px; margin: 0 auto; padding: 24px 16px 60px; }

            .header       { text-align: center; padding: 32px 0 24px; }
            .header-badge { font-size: 11px; font-weight: 700; letter-spacing: 3px; color: rgba(255,255,255,0.7); text-transform: uppercase; margin-bottom: 8px; }
            .header h1    { font-size: clamp(32px,7vw,64px); font-weight: 900; letter-spacing: 1px; line-height: 1.1; }
            .header-sub   { font-size: 13px; color: var(--muted); margin-top: 8px; }
            .header-intro { max-width: 560px; margin: 20px auto 0; text-align: left; display: flex; flex-direction: column; gap: 12px; }
            .header-intro p { font-size: 14px; line-height: 1.8; color: rgba(255,255,255,0.8); }
            .header-intro .disclaimer { font-size: 13px; font-style: italic; color: rgba(255,255,255,0.5); }

            .nav     { display: flex; gap: 8px; justify-content: center; margin-bottom: 32px; flex-wrap: wrap; }
            .nav-btn { background: transparent; border: 1px solid var(--line); color: var(--muted); padding: 8px 20px; border-radius: 99px; font-size: 13px; font-family: inherit; font-weight: 600; cursor: pointer; transition: all .2s; }
            .nav-btn:hover  { border-color: #fff; color: #fff; }
            .nav-btn.active { background: #fff; border-color: #fff; color: var(--bg); }

            .card       { background: rgba(255,255,255,0.07); border: 1px solid var(--line); border-radius: var(--radius); padding: 24px; margin-bottom: 16px; }
            .card-title { font-size: 18px; font-weight: 800; color: var(--chalk); margin-bottom: 16px; }

            .setup-grid { display: grid; grid-template-columns: repeat(auto-fill,minmax(200px,1fr)); gap: 12px; margin-bottom: 20px; }
            .input-wrap { display: flex; flex-direction: column; gap: 6px; }

            .input-wrap input { background: rgba(255,255,255,0.1); border: 1px solid var(--line); border-radius: 8px; padding: 10px 14px; color: #fff; font-family: inherit; font-size: 14px; outline: none; transition: border-color .2s; }
            .input-wrap input:focus { border-color: #fff; }
            .input-wrap input::placeholder { color: var(--muted); }

            .btn         { display: inline-flex; align-items: center; gap: 8px; padding: 12px 28px; border-radius: 8px; font-family: inherit; font-weight: 800; font-size: 15px; letter-spacing: .5px; cursor: pointer; border: none; transition: all .2s; }

            .btn-white:hover { background: #ffe0f0; }

            .share-bar  { display: flex; align-items: center; gap: 10px; background: rgba(255,255,255,0.1); border: 1px solid var(--line); border-radius: 8px; padding: 10px 14px; margin-top: 16px; font-size: 13px; }
            .share-bar span { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: var(--muted); }
            .share-copy { background: #fff; color: var(--bg); border: none; border-radius: 6px; padding: 6px 14px; font-family: inherit; font-weight: 700; font-size: 12px; cursor: pointer; white-space: nowrap; }
            .share-copy:hover { background: #ffe0f0; }

            .scores-bar { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; font-size: 12px; color: var(--muted); flex-wrap: wrap; }

            .scores-bar button:disabled { opacity: .5; }

            .tier-section { margin-bottom: 20px; }
            .tier-label   { font-size: 10px; font-weight: 800; letter-spacing: 2px; text-transform: uppercase; color: rgba(255,255,255,0.7); margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
            .tier-label::after { content:''; flex:1; height:1px; background: var(--line); }

            .draw-cell    { background: rgba(255,255,255,0.05); border: 1px solid var(--line); border-radius: 8px; padding: 10px 6px; text-align: center; transition: all .4s; }
            .draw-cell.revealed { border-color: rgba(255,255,255,0.3); background: rgba(255,255,255,0.1); }
            .dc-flag   { font-size: 22px; }
            .dc-name   { font-size: 10px; font-weight: 700; margin-top: 4px; line-height: 1.3; }

            .dc-rank   { font-size: 9px; color: var(--muted); margin-top: 1px; }
            .dc-pts    { font-size: 9px; color: rgba(255,255,255,0.9); font-weight: 700; margin-top: 2px; }

            .leaderboard { display: flex; flex-direction: column; gap: 10px; }
            .lb-row      { display: flex; align-items: center; gap: 14px; background: rgba(255,255,255,0.05); border: 1px solid var(--line); border-radius: 10px; padding: 14px 18px; }
            .lb-row.first{ border-color: rgba(255,255,255,0.6); background: rgba(255,255,255,0.12); }
            .lb-rank     { font-size: 26px; font-weight: 900; color: var(--muted); width: 30px; flex-shrink: 0; }
            .lb-rank.top { color: #fff; }
            .lb-name     { flex: 1; font-weight: 700; font-size: 16px; }

            .lb-pts-lbl  { font-size: 10px; color: var(--muted); text-align: right; }

            .pill        { display: inline-flex; align-items: center; gap: 4px; padding: 3px 9px; border-radius: 99px; font-size: 11px; border: 1px solid var(--line); background: rgba(255,255,255,0.04); }
            .pill.active { border-color: rgba(255,255,255,0.55); background: rgba(255,255,255,0.14); font-weight: 600; }
            .pill-pts    { font-weight: 800; }
            .pill-round  { font-size: 9px; color: var(--muted); }

            .pts-guide  { margin-top: 24px; padding: 14px 16px; background: rgba(0,0,0,0.12); border-radius: 8px; font-size: 11px; color: var(--muted); line-height: 1.8; }
            .reset-link { font-size: 12px; color: var(--muted); text-decoration: underline; cursor: pointer; background: none; border: none; font-family: inherit; margin-left: 16px; }
            .reset-link:hover { color: #fca5a5; }
            .spin { display: inline-block; animation: spin 1s linear infinite; }
            @keyframes spin { to { transform: rotate(360deg); } }
            .err  { color: #fca5a5; font-size: 12px; }

            @media (max-width: 600px) {
              .draw-grid { grid-template-columns: repeat(3,1fr); }
              .lb-score  { font-size: 22px; }
            }
          `}</style>

          {!siteUnlocked && (
            <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",padding:24}}>
              <div className="card" style={{width:"100%",maxWidth:360,textAlign:"center"}}>
                <div style={{fontSize:48,marginBottom:12}}>🏆</div>
                <div className="card-title">Strategy Team World Cup Sweepstake</div>
                <p style={{fontSize:13,color:"var(--muted)",marginBottom:20,lineHeight:1.6}}>Internal access only. Enter the password to continue.</p>
                <div className="input-wrap" style={{marginBottom:12}}>
                  <input
                    type="password"
                    placeholder="Password"
                    value={passwordInput}
                    onChange={e => { setPasswordInput(e.target.value); setPasswordError(false); }}
                    onKeyDown={e => e.key === "Enter" && trySiteUnlock()}
                    style={{textAlign:"center"}}
                  />
                </div>
                {passwordError && <p style={{color:"#fca5a5",fontSize:12,marginBottom:12}}>Incorrect password</p>}
                <button className="btn btn-white" style={{width:"100%",justifyContent:"center"}} onClick={trySiteUnlock}>
                  Enter
                </button>
              </div>
            </div>
          )}

          {siteUnlocked && <div className="app">

            <div className="header">
              <div className="header-badge">North America 2026</div>
              <h1>Strategy Team World Cup Sweepstake</h1>
              <div className="header-sub">6 players · 8 teams each · ranked draw</div>
              <div className="header-intro">
                <p>Welcome to the Strategy Team World Cup Sweepstake — where there is a comprehensive, MECE framework that underpins the value delivery for each team at the World Cup. With a net contribution of £10 to enter (pay in full or BNPL option - rep APR 44.9%)<br />Each team member receives a unique set of teams to follow in the World Cup. There is a Tiered Proposition for both team selection and points gained for each game won by a team - with an uplift per stage of the tournament. This will fundamentally enable a material uplift a single team member's pocket or charitable destination of choice.</p>
                <p>This sweepstake will be subject to a daily review, with clear measurement of team progress throughout the tournament.</p>
                <p className="disclaimer">Please note individual player goals, assists and other contributions are actively not included in this model. This will be developed for the next phase subject to stakeholder sign-off.</p>
              </div>
            </div>

            {assignments && (
              <div className="nav">
                <button className={`nav-btn ${view==="leaderboard"?"active":""}`} onClick={()=>setView("leaderboard")}>Leaderboard</button>
                <button className={`nav-btn ${view==="draw"?"active":""}`}        onClick={()=>setView("draw")}>Draw</button>
                <button className={`nav-btn ${view==="setup"?"active":""}`}       onClick={()=>setView("setup")}>Setup</button>
              </div>
            )}

            {view === "setup" && (
              <div>
                <div className="card">
                  <div className="card-title">Players</div>
                  <div className="setup-grid">
                    {participants.map((p,i) => (
                      <div className="input-wrap" key={i}>
                        <label>Player {i+1}</label>
                        <input
                          value={p}
                          placeholder={`Name ${i+1}`}
                          onChange={e => {
                            const u = [...participants];
                            u[i] = e.target.value;
                            setParticipants(u);
                          }}
                        />
                      </div>
                    ))}
                  </div>
                  <button className="btn btn-white" disabled={!allFilled} onClick={runDraw}>
                    🎰 Run the Draw
                  </button>
                  {assignments && (
                    <span style={{marginLeft:16,display:"inline-flex",alignItems:"center",gap:8}}>
                      {resetLocked ? (
                        <button className="reset-link" onClick={()=>setShowResetPrompt(true)}>🔒 Reset draw</button>
                      ) : (
                        <button className="reset-link" onClick={resetDraw}>⚠️ Confirm reset</button>
                      )}
                    </span>
                  )}
                  {showResetPrompt && (
                    <div style={{marginTop:16,background:"rgba(0,0,0,0.15)",borderRadius:8,padding:16}}>
                      <p style={{fontSize:13,color:"var(--muted)",marginBottom:10}}>Enter password to unlock reset:</p>
                      <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                        <input
                          type="password"
                          placeholder="Password"
                          value={resetPwInput}
                          onChange={e=>{setResetPwInput(e.target.value);setResetPwError(false);}}
                          onKeyDown={e=>e.key==="Enter"&&tryResetUnlock()}
                          style={{flex:1,background:"rgba(255,255,255,0.1)",border:"1px solid var(--line)",borderRadius:8,padding:"8px 12px",color:"#fff",fontFamily:"inherit",fontSize:13,outline:"none"}}
                        />
                        <button className="btn btn-white" style={{padding:"8px 16px",fontSize:13}} onClick={tryResetUnlock}>Unlock</button>
                        <button className="reset-link" onClick={()=>{setShowResetPrompt(false);setResetPwInput("");setResetPwError(false);}}>Cancel</button>
                      </div>
                      {resetPwError && <p style={{color:"#fca5a5",fontSize:12,marginTop:8}}>Incorrect password</p>}
                    </div>
                  )}
                </div>

                {assignments && (
                  <div className="card">
                    <div className="card-title">Share with players</div>
                    <p style={{fontSize:13,color:"var(--muted)",marginBottom:4,lineHeight:1.6}}>
                      Send this link to everyone — they'll see the draw and live scores updated every morning at 9am UK time.
                    </p>
                    <div className="share-bar">
                      <span>{window.location.href}</span>
                      <button className="share-copy" onClick={copyLink}>
                        {copied ? "✓ Copied!" : "Copy link"}
                      </button>
                    </div>
                  </div>
                )}

                <div className="card">
                  <div className="card-title">Scores</div>
                  <p style={{fontSize:13,color:"var(--muted)",lineHeight:1.6}}>
                    Scores update automatically every morning at <strong style={{color:"#fff"}}>9am UK time</strong>. No setup needed — just share the link above and everyone sees the same live leaderboard.
                  </p>
                </div>
              </div>
            )}

            {view === "draw" && assignments && (
              <div>
                <p style={{fontSize:12,color:"var(--muted)",marginBottom:20,textAlign:"center"}}>
                  Teams drawn from 8 ranked tiers · each player gets one team per tier
                </p>
                {[1,2,3,4,5,6,7,8].map(tier => (
                  <div className="tier-section" key={tier} style={{opacity:revealedTiers.includes(tier)?1:0.15,transition:"opacity .5s"}}>
                    <div className="tier-label">Tier {tier} — {tierNames[tier]}</div>
                    <div className="draw-grid">
                      {Object.entries(assignments).map(([participant, teams]) => {
                        const team  = teams.find(t => t.tier === tier);
                        if (!team) return null;
                        const pts   = getTeamPoints(team);
                        const round = teamStatus[team.name];
                        return (
                          <div className={`draw-cell ${revealedTiers.includes(tier)?"revealed":""}`} key={participant}>
                            <div className="dc-flag">{team.flag}</div>
                            <div className="dc-name">{team.name}</div>
                            <div className="dc-player">{participant}</div>
                            <div className="dc-rank">FIFA #{team.fifaRank}</div>
                            {round && <div className="dc-pts">{round} +{pts}pts</div>}
                          </div>
                        );
                      })}
                    </div>
                  </div>
                ))}
              </div>
            )}

            {view === "leaderboard" && assignments && (
              <div>
                <div className="scores-bar">
                  {lastUpdated
                    ? <span>Scores as of {new Date(lastUpdated).toLocaleDateString("en-GB",{day:"numeric",month:"short",hour:"2-digit",minute:"2-digit"})}</span>
                    : <span>Scores update daily at 9am UK time</span>
                  }
                  <button disabled={loading} onClick={fetchScores}>
                    {loading ? <span className="spin">⟳</span> : "↻ Refresh"}
                  </button>
                  {scoreError && <span className="err">⚠ {scoreError}</span>}
                </div>

                <div className="leaderboard">
                  {getSortedLeaderboard().map((entry,idx) => {
                    const teams   = assignments[entry.name] || [];
                    const isFirst = idx===0 && entry.score > 0;
                    return (
                      <div className={`lb-row ${isFirst?"first":""}`} key={entry.name}>
                        <div className={`lb-rank ${isFirst?"top":""}`}>{idx+1}</div>
                        <div style={{flex:1}}>
                          <div className="lb-name">{entry.name}</div>
                          <div className="pills">
                            {[...teams].sort((a,b)=>a.tier-b.tier).map(team => {
                              const pts = getTeamPoints(team);
                              const { round, roundPts, wins } = getTeamPointsBreakdown(team);
                              const title = [round, wins>0?`${wins} group win${wins>1?"s":""}`:""].filter(Boolean).join(" · ") || "Group stage";
                              return (
                                <span className={`pill ${pts>0?"active":""}`} key={team.name} title={title}>
                                  {team.flag} {team.name}
                                  {wins>0    && <span className="pill-round">{wins}W</span>}
                                  {round     && <span className="pill-round">{round}</span>}
                                  {pts>0     && <span className="pill-pts">+{pts}</span>}
                                </span>
                              );
                            })}
                          </div>
                        </div>
                        <div style={{textAlign:"right"}}>
                          <div className="lb-score">{entry.score}</div>
                          <div className="lb-pts-lbl">pts</div>
                        </div>
                      </div>
                    );
                  })}
                </div>

                <div className="pts-guide">
                  <strong style={{color:"#fff"}}>Points: </strong>
                  Group stage win +1 · {Object.entries(ROUND_POINTS).filter(([,v])=>v>0).map(([k,v])=>`${k} +${v}`).join(" · ")}
                </div>
              </div>
            )}

            {!assignments && view !== "setup" && (
              <div style={{textAlign:"center",padding:40,color:"var(--muted)"}}>
                <div style={{fontSize:40,marginBottom:12}}>🏆</div>
                <div>No draw yet.</div>
                <button className="btn btn-white" style={{marginTop:16}} onClick={()=>setView("setup")}>Set Up Sweepstake</button>
              </div>
            )}

          </div>}
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
